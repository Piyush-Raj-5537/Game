<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone-Paper-Scissor Game</title>
    <link rel="stylesheet" href="sps.css">
</head>

<body>
    <h1>Stone-Paper-Scissor Game</h1>
    <div class="choices">
        <div class="choice" id="rock">
            <img src="rock.png">
        </div>

        <div class="choice" id="paper">
            <img src="paper.png">
        </div>

        <div class="choice" id="scissors">
            <img src="scissors.png">
        </div>
    </div>

    <div class="scorecard">
        <div class="score">
            <p id="user">0</p>
            <p>User</p>
        </div>

        <div class="score">
            <p id="computer">0</p>
            <p>Computer</p>
        </div>
    </div>

    <div class="message-container">
        <p id="message">Play your move</p>
    </div>
    <script src="sps.js"></script>
</body>

</html>
